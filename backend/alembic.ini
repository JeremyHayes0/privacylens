[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is intentionally left blank here -- alembic/env.py
# overrides it at runtime from app.core.config.settings.DATABASE_URL,
# so the same environment variables that configure the running app
# also configure migrations. This avoids a second, easily-forgotten
# place to update the database URL.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
